name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Compile Python sources
        run: python -m compileall -q .

      - name: Check whitespace
        run: git diff --check

      - name: Reject binary analysis artifacts
        shell: python
        run: |
          import subprocess
          from pathlib import PurePosixPath

          forbidden = {".i64", ".idb", ".sqlite", ".diaphora", ".id0", ".id1", ".id2"}
          tracked = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          bad = [p for p in tracked if PurePosixPath(p).suffix.lower() in forbidden]
          if bad:
              raise SystemExit("Tracked analysis artifacts: " + ", ".join(bad))
